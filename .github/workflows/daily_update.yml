name: Daily regime update

on:
  workflow_dispatch:
  schedule:
    - cron: "45 23 * * 1-5"

permissions:
  contents: write

jobs:
  run-live:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live regime inference
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python src/live_run.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/snapshot.json
          git commit -m "Auto-update live regime snapshot" || echo "No changes to commit"
          git push
